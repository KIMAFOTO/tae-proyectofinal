<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAE4 | Galería de Videos</title>
<style>
body{
    background:#000;
    color:white;
    font-family:Arial;
    margin:0;
    padding:40px;
}
h1{
    text-align:center;
    margin-bottom:40px;
    letter-spacing:5px;
}
/* BOTÓN VOLVER */
.volver{

    display:block;

    width:max-content;

    margin:30px auto;

    padding:15px 25px;

    background:#deff9a;

    color:black;

    text-decoration:none;

    border-radius:10px;

    font-weight:bold;

    transition:0.3s;

}

.volver:hover{

    transform:scale(1.05);

}
/* GALERÍA */
.galeria-videos{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
}
/* VIDEOS */
.galeria-videos video{
    width:100%;
    height:250px;
    object-fit:contain;
    background:black;
    border-radius:15px;
    box-shadow:0 0 15px rgba(222,255,154,0.2);
    transition:0.4s;
}
.galeria-videos video:hover{
    transform:scale(1.02);
    box-shadow:0 0 25px #deff9a;
}
</style>
</head>
<body>

<h1>TAE4</h1>
<div class="galeria-videos">
    <video controls>
        <source src="videos/tae4/video1tae4.mp4" type="video/mp4">
    </video>
    <video controls>
        <source src="videos/tae4/video2tae4.mp4" type="video/mp4">
    </video>
    <video controls>
        <source src="videos/tae4/video3tae4.MOV" type="video/mp4">
    </video>
    <video controls>
        <source src="videos/tae4/video4tae4.MOV" type="video/mp4">
    </video>
</div> 
<a href="proyectotae.html" class="volver">
Volver al inicio
</a> 

</body>
</html>
