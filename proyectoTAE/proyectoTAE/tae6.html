<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TAE6</title>

    <style>

        body{
            background:#000;
            color:white;
            font-family:Arial;
            margin:0;
            padding:40px;
        }

        h1{
            text-align:center;
            margin-bottom:40px;
            letter-spacing:5px;
        }

        /* GALERÍA */
        .gallery{
            width:90%;
            margin:auto;

            display:grid;

            grid-template-columns:
            repeat(auto-fit,minmax(400px,1fr));

            gap:25px;
        }

        /* IMÁGENES HORIZONTALES */
        .gallery img{

            width:100%;

            height:250px;

            object-fit:contain;

            background:black;

            border-radius:15px;

            transition:0.4s;
        }

        .gallery img:hover{

            transform:scale(1.03);

            box-shadow:0 0 20px #deff9a;
        }

        /* BOTÓN */
        .volver{

            display:block;

            width:max-content;

            margin:40px auto;

            padding:15px 25px;

            background:#deff9a;

            color:black;

            text-decoration:none;

            border-radius:10px;

            font-weight:bold;

            transition:0.3s;
        }

        .volver:hover{

            transform:scale(1.05);
        }

    </style>
</head>

<body>

    <h1>TAE6</h1>

    <div class="gallery">

        <img src="img/tae6/foto1tae6.png" alt="Trabajo 1">
        <img src="img/tae6/foto2tae6.png" alt="Trabajo 2">
        <img src="img/tae6/foto3tae6.png" alt="Trabajo 3">
        <img src="img/tae6/foto4tae6.png" alt="Trabajo 4">

    </div>

    <a href="proyectotae.html" class="volver">
        Volver al inicio
    </a>

</body>
</html>
