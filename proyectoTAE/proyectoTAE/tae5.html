<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAE5 | Galería de Fotografía</title> 

    <style>

        body {

            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
        }

        h1 {

            text-align: center;

            padding: 40px;

            letter-spacing: 5px;

        }

        .gallery {

            width: 90%;

            margin: auto;

            display: grid;

            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));

            gap: 25px;

            padding-bottom: 50px;

        }

        .gallery img {

            width: 100%;

            height: 350px;

            object-fit: cover;

            border-radius: 15px;

            transition: 0.4s;

        }

        .gallery img:hover {

            transform: scale(1.03);

        }
        .horizontal {
            object-fit: contain;
        }

        .back {

            display: block;

            width: max-content;

            margin: 30px auto;

            padding: 15px 25px;

            background: #deff9a;

            color: black;

            text-decoration: none;

            border-radius: 10px;

            font-weight: bold;

            transition: 0.3s;

        }

        .back:hover {

            transform: scale(1.05);

        }

    </style>

</head>

<body>

    <h1>TAE5</h1>

    <div class="gallery">

        <img src="img/tae5/foto1tae5.png" alt="Trabajo 1">
        <img src="img/tae5/foto2tae5.jpg" alt="Trabajo 2">
        <img src="img/tae5/foto3tae5.png" alt="Trabajo 3">
        <img src="img/tae5/foto4tae5.jpg" alt="Trabajo 4">

    </div>

    <a href="proyectotae.html" class="back">Volver al inicio</a> 
</body>
</html>
