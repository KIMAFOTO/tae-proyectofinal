<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TAE3 | Galería de Fotografía</title>

    <style>

        body{
            background-color:#0a0a0a;
            color:#ffffff;
            font-family:'Montserrat', sans-serif;
            margin:0;
            padding:0;
        }

        h1{
            text-align:center;
            padding:40px;
            letter-spacing:5px;
        }

        /* GALERÍA */

        .gallery{

            width:90%;

            margin:auto;

            display:grid;

            grid-template-columns:
            repeat(auto-fit,minmax(300px,1fr));

            gap:25px;

            padding-bottom:50px;
        }

        /* TODAS LAS IMÁGENES */

        .gallery img{

            width:100%;

            height:350px;

            object-fit:cover;

            border-radius:15px;

            transition:0.4s;
        }

        /* FOTO 3 Y 4 HORIZONTALES */

        .horizontal{

            height:250px !important;

            object-fit:cover;
        }

        .gallery img:hover{

            transform:scale(1.03);

            box-shadow:0 0 20px #deff9a;
        }

        /* BOTÓN */

        .volver{

            display:block;

            width:max-content;

            margin:30px auto;

            padding:15px 25px;

            background:#deff9a;

            color:black;

            text-decoration:none;

            border-radius:10px;

            font-weight:bold;

            transition:0.3s;
        }

        .volver:hover{

            transform:scale(1.05);
        }

    </style>

</head>

<body>

    <h1>TAE3</h1>

    <div class="gallery">

        <img src="img/tae3/foto1.jpg" alt="Trabajo 1">

        <img src="img/tae3/foto2.jpg" alt="Trabajo 2">

        <img src="img/tae3/foto3.jpg"
        class="horizontal"
        alt="Trabajo 3">

        <img src="img/tae3/foto4.jpg"
        class="horizontal"
        alt="Trabajo 4">

    </div>

    <a href="proyectotae.html" class="volver">
        Volver al inicio
    </a>

</body>
</html>
